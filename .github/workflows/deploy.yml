name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'   # Score Study's data-sync commits don't need a redeploy
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # HARD SEPARATION GUARD — the Ensembles Hub lives in its own
      # repository (nwsa-music-hub) and must never return here. If the app
      # folder reappears, or Longitude's source references the hub, the
      # deploy fails dead right here.
      - name: Separation guard (Ensembles Hub must stay in its own repo)
        run: |
          if [ -d ensembles ]; then
            echo "::error::Separation violation: ensembles/ must not exist in this repo — the hub lives in the nwsa-music-hub repository. Deploy blocked."
            exit 1
          fi
          if grep -rn "ensembles/\|nwsa-music-hub" src/ public/ index.html 2>/dev/null; then
            echo "::error::Separation violation: Longitude source must not reference the Ensembles Hub. Deploy blocked."
            exit 1
          fi
          echo "Separation guard passed."

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      # Companion apps live in their own folders as static sites and ride
      # along in the same Pages deployment (e.g. /score-study/).
      # NOTE: the Ensembles Hub is NOT one of them — it lives in its own
      # repository (nwsa-music-hub) and is guarded against ever returning here.
      - name: Include companion apps
        run: |
          [ -d score-study ] && cp -r score-study dist/score-study || true
          [ -d data ] && cp -r data dist/data || true

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
