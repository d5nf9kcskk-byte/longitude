<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Longitude</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
  <style>
    :root { --page:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e; --border:rgba(11,11,11,.1); --accent:#2a78d6; }
    @media (prefers-color-scheme: dark) {
      :root { --page:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink2:#c3c2b7; --border:rgba(255,255,255,.1); --accent:#3987e5; }
    }
    body { margin:0; background:var(--page); color:var(--ink); font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
           min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .wrap { max-width:520px; padding:32px 20px; }
    h1 { font-size:34px; letter-spacing:-.02em; margin:0 0 6px; }
    .sub { color:var(--ink2); margin:0 0 28px; }
    a.app { display:block; background:var(--surface); border:1px solid var(--border); border-radius:14px;
            padding:18px 20px; color:inherit; text-decoration:none; margin:12px 0; }
    a.app:hover { border-color:var(--accent); }
    .app-name { font-weight:650; font-size:17px; }
    .app-desc { color:var(--ink2); font-size:14px; margin-top:2px; }
    .soon { opacity:.55; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Longitude</h1>
    <p class="sub">Apps in this collection:</p>
    <a class="app" href="./score-study/">
      <div class="app-name">🎼 Score Study</div>
      <div class="app-desc">Encode first, recall on schedule — a coach for learning musical scores efficiently.</div>
    </a>
    <a class="app soon" href="#" onclick="return false">
      <div class="app-name">🧭 Longitude</div>
      <div class="app-desc">Coming soon — this spot is reserved for the Longitude app itself.</div>
    </a>
  </div>
</body>
</html>
